<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newbie AI Recipe Generator</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <!-- DOMPurify for safe HTML rendering -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>
<body>

    <div class="container">

        <div class="card">

            <div class="header">
                <h1>🍳 Newbie AI</h1>

                <p>
                    Enter three ingredients and let AI create a delicious recipe instantly.
                </p>
            </div>

            <div class="ingredient-inputs">

                <div class="input-wrapper">
                    <span>🥬</span>
                    <input type="text" id="ing1" placeholder="Ingredient 1" />
                </div>

                <div class="input-wrapper">
                    <span>🥩</span>
                    <input type="text" id="ing2" placeholder="Ingredient 2" />
                </div>

                <div class="input-wrapper">
                    <span>🧂</span>
                    <input type="text" id="ing3" placeholder="Ingredient 3" />
                </div>

            </div>

            <button id="generateBtn">
                Generate Recipe
            </button>

            <div id="errorMessage" class="error-message"></div>

            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p>Cooking your AI recipe...</p>
            </div>

            <div id="resultContainer" class="result-container">

                <div id="recipeContent" class="recipe-content"></div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
